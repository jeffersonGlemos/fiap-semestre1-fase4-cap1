#
# Arquitetura híbrida:
#   - Este compose sobe APENAS dois serviços: 'api' (FastAPI) e 'streamlit'.
#   - O Oracle XE NÃO é definido aqui: ele é um Oracle XE EXTERNO (rodando na
#     máquina host), que expõe o Oracle em localhost:1521 (service XEPDB1).
#     A tabela SENSORES_FARMTECH vive nesse Oracle externo.
#
# Como a 'api' alcança o Oracle XE externo (escolha UMA das opções):
#   (A) host.docker.internal  -> já configurado abaixo via extra_hosts.
#       ORACLE_DSN aponta para host.docker.internal:1521/XEPDB1.
#   (B) rede externa compartilhada -> suba o Oracle XE externo primeiro, descubra
#       o nome da rede (docker network ls) e troque os comentários da seção
#       'networks', ajustando ORACLE_DSN para o hostname do container Oracle.

services:
  # ----------------------------------------------------------------------
  # API FastAPI — serve modelos e consulta o Oracle (fonte 'local'/'cloud')
  # ----------------------------------------------------------------------
  api:
    build: ./api
    container_name: farmtech_f4c1_api
    ports:
      - "8000:8000"
    environment:
      # Fonte de dados: local = Oracle/API ; cloud = parquet + joblib do repo
      DATA_SOURCE: ${DATA_SOURCE:-local}
      # Conexão com o Oracle XE EXTERNO
      ORACLE_DSN: ${ORACLE_DSN:-host.docker.internal:1521/XEPDB1}
      ORACLE_USER: ${ORACLE_USER:-system}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle}
      # Localização dos artefatos dentro do container
      MODELS_DIR: /app/models
      DATA_PATH: /app/data/processed/dataset_ml.parquet
    volumes:
      # Modelos e dados montados como SOMENTE LEITURA
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    extra_hosts:
      # Permite resolver o host da máquina (Oracle XE externo) de dentro do container
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # networks:
    #   - oracle_net   # opção (B): usar a rede externa do Oracle XE

  # ----------------------------------------------------------------------
  # Streamlit — dashboard do Assistente Agrícola
  # ----------------------------------------------------------------------
  streamlit:
    build: ./streamlit
    container_name: farmtech_f4c1_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      # URL da API consumida quando DATA_SOURCE=local
      API_URL: ${API_URL:-http://api:8000}
      # local = consome API/Oracle ; cloud = lê parquet + joblib versionados
      DATA_SOURCE: ${DATA_SOURCE:-local}
      MODELS_DIR: /app/models
      DATA_PATH: /app/data/processed/dataset_ml.parquet
    volumes:
      # Mesmos artefatos, montados como SOMENTE LEITURA
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    # networks:
    #   - oracle_net   # opção (B): usar a rede externa do Oracle XE

# --------------------------------------------------------------------------
# Opção (B) — rede externa compartilhada com o Oracle XE externo.
# Suba o Oracle XE externo primeiro; confirme o nome real da rede com
# 'docker network ls' e ajuste 'name' abaixo. Depois descomente as
# referências 'networks:' em cada serviço acima.
# --------------------------------------------------------------------------
# networks:
#   oracle_net:
#     external: true
#     name: oracle_net
