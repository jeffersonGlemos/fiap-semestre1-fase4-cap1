# Configuracao do Streamlit — FarmTech Solutions (Fase 4 / Cap. 1)
# Tema agricola (base light, verdes/terra) e ajustes de servidor para deploy.

[theme]
base = "light"
primaryColor = "#2e7d32"          # verde folha (acoes/destaques)
backgroundColor = "#f7faf5"       # fundo claro levemente esverdeado
secondaryBackgroundColor = "#e8f0e3"  # cards / sidebar
textColor = "#1b3a1b"             # verde escuro para boa leitura
font = "sans serif"

[server]
# Porta/endereco NAO sao fixados aqui: o Streamlit Cloud os gerencia, e fixar
# 'port' conflita com o modo de desenvolvimento. No Docker, a porta vem do CMD
# (--server.port=8501); localmente usa o default 8501.
headless = true                   # nao tenta abrir navegador (containers/cloud)
enableXsrfProtection = true       # protecao XSRF (default seguro; CORS fica em 'true')
maxUploadSize = 50

[browser]
gatherUsageStats = false          # sem telemetria

[runner]
fastReruns = true
